version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/data:/app/app/data
      - ./backend/app/models:/app/app/models
      - ./backend/app/logs:/app/app/logs
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

networks:
  default:
    name: booksage-network
